version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: toug_ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_KEEP_ALIVE=1m
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Descomente a seção abaixo se o servidor tiver placa de vídeo (NVIDIA) configurada com o Nvidia Container Toolkit.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: toug_cloudflared
    command: tunnel --no-autoupdate run --token ${eyJ6b25lSUQiOiIzNmU1NGI3ODk2M2YzMDY3OWE1MTA2Y2Y2MzhlMTVjNSIsImFj
Y291bnRJRCI6IjdlMTUyMGM4YTVlZWNhOTM5MDFiZjVkMTg3NTU0NGYwIiwiYXBp
VG9rZW4iOiJjZnV0X1FBaVRtZDdUbzRUSVBFenFRWTJwMDMxQ2ZzY01vckx6VDhR
U04wTU9lZGVlN2IyYSJ9}
    restart: unless-stopped
    depends_on:
      - ollama

volumes:
  ollama_data: